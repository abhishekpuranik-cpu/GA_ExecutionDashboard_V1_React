services:
  - type: web
    name: constructionanalytics
    runtime: node
    rootDir: .
    buildCommand: npm ci && npm run build
    startCommand: npm run start
    healthCheckPath: /api/health
    envVars:
      - key: NODE_VERSION
        value: 22
      - key: MONGODB_URI
        sync: false
      - key: MONGODB_DB_NAME
        value: ga_execution_dashboard
